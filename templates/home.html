{% extends 'base.html' %}

{% block title %}Login - MyMusicMood{% endblock %}

{% block auth_content %}
<div class="auth-wrapper">
    <div class="auth-card">
        <h1>MyMusicMood</h1>
        <p>Discover personalized music recommendations based on your mood, languages, and history.</p>
        
        <form action="/" method="POST">
            <input type="text" name="username" class="glass-input" placeholder="Your Username" required>
            <input type="email" name="email" class="glass-input" placeholder="Your Email Address" required>
            <button type="submit" class="btn-primary" style="width: 100%; margin-top: 16px;">Enter the Vibe</button>
        </form>
        
        <div style="margin-top: 32px; font-size: 13px; color: var(--text-muted);">
            Log in with an existing email, or register a new one automatically.
        </div>
    </div>
</div>
{% endblock %}
